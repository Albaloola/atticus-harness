name: "atticus"

forbidden_paths:
  - ".env"
  - ".env.*"
  - "secrets/"
  - "private/"
  - "evidence/"
  - "court_bundles/"
  - "case_materials/originals/"
  - ".git/"

sensitive_paths:
  - "atticus/citations/"
  - "atticus/reducer/"
  - "atticus/memory/"
  - "atticus/legal/"
  - "atticus/tool_kernel/"
  - "atticus/context_pack/"

required_principles:
  - "Do not weaken citation validation."
  - "Do not mutate original evidence."
  - "Do not allow candidate model output into trusted memory without validation."
  - "Do not weaken reducer-only canonical writes."
  - "Do not remove audit logs."
  - "Do not allow external legal actions without explicit user approval."
  - "Do not silently fallback between models for legal-critical outputs unless logged."

required_checks:
  - "python -m pytest"
  - "ruff check ."

diff_limits:
  max_files_changed: 8
  max_diff_lines: 800
  max_deleted_lines: 500

auto_merge: false
auto_push: false
