name: "default"

forbidden_paths:
  - ".env"
  - ".env.*"
  - "secrets/"
  - "private/"
  - "evidence/"
  - "court_bundles/"
  - "node_modules/"
  - ".git/"

required_principles:
  - "Keep autonomous changes small and reversible."
  - "Do not touch secrets or environment files."
  - "Do not auto-merge or auto-push."

required_checks:
  - "python -m pytest"

diff_limits:
  max_files_changed: 8
  max_diff_lines: 800
  max_deleted_lines: 500

loop:
  delay_seconds: 120
  max_iterations_per_day: 50
  max_runtime_per_iteration_minutes: 45
  max_consecutive_failures: 3
  max_repair_attempts: 2
  stop_file: ".forge/STOP"
  daily_cost_limit_usd: 5.0

auto_commit: true
auto_merge: false
auto_push: false
